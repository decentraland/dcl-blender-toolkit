[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long — handled by formatter
    "E741",   # ambiguous variable name (common in Blender code: l, O)
    "F841",   # local variable assigned but never used (Blender execute() patterns)
    "B904",   # raise from within except (not always needed)
    "SIM102", # nested if — common Blender pattern, more readable than chained and
    "SIM105", # contextlib.suppress — try/except/pass is clearer in Blender operators
    "SIM108", # ternary operator (readability preference)
    "SIM110", # reimplemented builtin (Blender patterns differ)
    "UP031",  # printf-style formatting (common in Blender code)
]

[tool.ruff.lint.per-file-ignores]
"src/__init__.py" = ["E402", "F401"]  # imports after bl_info, re-exports
"src/ops/__init__.py" = ["F401"]
"tests/*" = ["E402", "F401", "F811"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
